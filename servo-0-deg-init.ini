#include <ESP32Servo.h>
Servo myServo;

int servoPin = 13; // GPIO pin connected to the servo signal wire
int servoAngle = 0; // Initial angle for the servo
void setup() {
  myServo.attach(servoPin); // Attach the servo to the specified pin
  myServo.write(servoAngle); // Set the servo to the initial angle (0 degrees)
}
void loop() {
  // The servo will remain at the initial angle (0 degrees) indefinitely
  // You can add code here to change the servo angle if needed
}   